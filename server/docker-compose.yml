services:
  server:
    image: charmflex/server-tasktracker-server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TASKTRACKER_DB_URL: ${TASKTRACKER_DB_URL:}
      TASKTRACKER_DB_USERNAME: ${TASKTRACKER_DB_USERNAME:-tasktracker}
      TASKTRACKER_DB_PASSWORD: ${TASKTRACKER_DB_PASSWORD:-tasktracker}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-/run/secrets/tasktracker/firebase-service-account.json}
    ports:
      - "3000:3000"
    volumes:
      - ./secrets:/run/secrets/tasktracker:ro
    restart: unless-stopped
