spring.config.import=optional:.env.properties
server.port=3000
spring.application.name=tasktracker-server
spring.messages.encoding=UTF-8

spring.datasource.url=${TASKTRACKER_DB_URL}
spring.datasource.username=${TASKTRACKER_DB_USERNAME}
spring.datasource.password=${TASKTRACKER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.project-id=${FIREBASE_PROJECT_ID:}
