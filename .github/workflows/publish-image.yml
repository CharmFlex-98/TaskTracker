name: Build Server Image and Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Send docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          passphrase: ${{ secrets.SERVER_SSH_PW }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ./server/docker-compose.yml
          target: ./servers/tasktracker_server
          strip_components: 1

      - name: Build and publish server image
        working-directory: ./server
        run: |
          chmod +x ./gradlew
          ./gradlew bootBuildImage
        env:
          DOCKER_LOGIN_USERNAME: ${{ secrets.DOCKER_LOGIN_USERNAME }}
          DOCKER_LOGIN_PW: ${{ secrets.DOCKER_LOGIN_PW }}

      - name: Pull image and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          passphrase: ${{ secrets.SERVER_SSH_PW }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd servers/tasktracker_server
            docker compose pull
            docker compose up -d
